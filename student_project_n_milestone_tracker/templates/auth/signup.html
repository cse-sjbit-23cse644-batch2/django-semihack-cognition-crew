{% extends 'base.html' %}

{% block title %}Sign Up | MilestoneTracker{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-blue-100">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                    <i class="ph-fill ph-user-plus text-3xl text-blue-600"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900">Create Account</h1>
                <p class="text-slate-500 text-sm mt-2">Join MilestoneTracker to manage your projects</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                {% if error %}
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-red-700 text-sm">{{ error }}</p>
                </div>
                {% endif %}

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="first_name" class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
                        <input type="text" name="first_name" id="first_name" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="John">
                    </div>
                    <div>
                        <label for="last_name" class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
                        <input type="text" name="last_name" id="last_name" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Doe">
                    </div>
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="johndoe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" name="email" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="john@example.com">
                </div>

                <div>
                    <label for="role" class="block text-sm font-medium text-slate-700 mb-1">I am a...</label>
                    <select name="role" id="role" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                        <option value="STUDENT">Student</option>
                        <option value="GUIDE">Guide / Teacher</option>
                    </select>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 mt-6">
                    <i class="ph-bold ph-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-200 text-center">
                <p class="text-slate-600 text-sm">
                    Already have an account? 
                    <a href="{% url 'login_page' %}" class="text-blue-600 hover:text-blue-700 font-semibold">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
